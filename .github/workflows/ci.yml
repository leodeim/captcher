name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify dependencies
        run: |
          for dir in . middleware/ginmw middleware/echomw example; do
            (cd "$dir" && go mod tidy)
          done
          git diff --exit-code

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: |
          for dir in . middleware/ginmw middleware/echomw example; do
            (cd "$dir" && go vet ./...)
          done

      - name: Unit tests
        run: |
          for dir in . middleware/ginmw middleware/echomw example; do
            (cd "$dir" && go test -race -coverprofile=coverage.out -covermode=atomic ./...)
          done

      - name: Integration tests
        run: |
          for dir in . middleware/ginmw middleware/echomw example; do
            (cd "$dir" && go test -tags integration -race -run Integration ./...)
          done

      - name: Upload coverage
        if: matrix.go-version == '1.25'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out,./middleware/ginmw/coverage.out,./middleware/echomw/coverage.out
        continue-on-error: true
